    // Helper: get id from ?id=prop1
    function getPropertyIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function Tabs({ activeTab, onChange }) {
      return (
        <div className="tabs">
          <button
            type="button"
            className={activeTab === "description" ? "tab active" : "tab"}
            onClick={() => onChange("description")}
          >
            Description
          </button>
          <button
            type="button"
            className={activeTab === "floorplan" ? "tab active" : "tab"}
            onClick={() => onChange("floorplan")}
          >
            Floor Plan
          </button>
          <button
            type="button"
            className={activeTab === "map" ? "tab active" : "tab"}
            onClick={() => onChange("map")}
          >
            Map
          </button>
        </div>
      );
    }

        function PropertyPage() {
        const idFromUrl = getPropertyIdFromUrl();


        const property =
            PROPERTY_DATA.properties.find(p => p.id === idFromUrl) ||
            PROPERTY_DATA.properties[0];

        const [activeImageIndex, setActiveImageIndex] = React.useState(0);
        const [activeTab, setActiveTab] = React.useState("description");

        const mainImage = property.images[activeImageIndex];
        return (
        <div className="property-page">
          <section className="property-main">
            <div className="property-main-image">
              <img
                src={mainImage}
                alt={property.type + " main image"}
                onError={e => (e.target.style.display = "none")}
              />
            </div>

            <div className="property-thumbnails">
              {property.images.map((img, index) => (
                <button
                  key={img}
                  type="button"
                  className={
                    "thumbnail-btn" +
                    (index === activeImageIndex ? " selected" : "")
                  }
                  onClick={() => setActiveImageIndex(index)}
                >
                  <img
                    src={img}
                    alt={property.type + " thumbnail " + (index + 1)}
                    onError={e => (e.target.style.display = "none")}
                  />
                </button>
              ))}
            </div>

            <div className="property-summary">
              <h2>
                £{property.price.toLocaleString()} – {property.bedrooms} bedroom{" "}
                {property.type}
              </h2>
              <p className="property-location">{property.location}</p>
              <p>{property.shortDescription}</p>
            </div>
          </section>

          <section className="property-tabs">
            <Tabs activeTab={activeTab} onChange={setActiveTab} />

            <div className="tab-content">
              {activeTab === "description" && (
                <div>
                  <h3>Full Description</h3>
                  <p>{property.longDescription}</p>
                </div>
              )}

              {activeTab === "floorplan" && (
                <div>
                  <h3>Floor Plan</h3>
                  <img
                    src={property.floorplan}
                    alt="Floor plan"
                    className="floorplan-image"
                    onError={e => (e.target.style.display = "none")}
                  />
                </div>
              )}

              {activeTab === "map" && (
                <div>
                  <h3>Location Map</h3>
                  <p>Approximate property location:</p>
                  <div className="map-wrapper">
                    <iframe
                      src={property.mapEmbed}
                      loading="lazy"
                      referrerPolicy="no-referrer-when-downgrade"
                      title="Google map"
                    ></iframe>
                  </div>
                </div>
              )}
            </div>
          </section>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<PropertyPage />);
