<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Property Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />


<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               img-src 'self' data:;
               script-src 'self' 'unsafe-inline' https://unpkg.com;
               style-src 'self' 'unsafe-inline';
               frame-src https://www.google.com;">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
</head>
<body>
  <main>
    <a href="index.html">&larr; Back to search</a>
    <h1>Property Details</h1>
    <div id="root"></div>
  </main>

  
  <script type="text/babel">
    // Properties are now loaded from data/properties.json via fetch(),
    // instead of being hardcoded here. See PropertyPage below for the
    // useState/useEffect logic that loads them and finds the matching one.

    // Helper: get id from ?id=prop1
    function getPropertyIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function Tabs({ activeTab, onChange }) {
      return (
        <div className="tabs">
          <button
            type="button"
            className={activeTab === "description" ? "tab active" : "tab"}
            onClick={() => onChange("description")}
          >
            Description
          </button>
          <button
            type="button"
            className={activeTab === "floorplan" ? "tab active" : "tab"}
            onClick={() => onChange("floorplan")}
          >
            Floor Plan
          </button>
          <button
            type="button"
            className={activeTab === "map" ? "tab active" : "tab"}
            onClick={() => onChange("map")}
          >
            Map
          </button>
        </div>
      );
    }

        function PropertyPage() {
        const idFromUrl = getPropertyIdFromUrl();

        // All properties are fetched once on mount; we then find() the one
        // matching the ?id= in the URL. This mirrors index.html's pattern
        // so both pages share the same data source and loading approach.
        const [properties, setProperties] = React.useState([]);
        const [loading, setLoading] = React.useState(true);
        const [loadError, setLoadError] = React.useState(null);

        React.useEffect(() => {
          fetch("data/properties.json")
            .then((response) => {
              if (!response.ok) {
                throw new Error("Network response was not OK (" + response.status + ")");
              }
              return response.json();
            })
            .then((data) => {
              setProperties(data.properties);
              setLoading(false);
            })
            .catch((error) => {
              console.error("Failed to load properties.json:", error);
              setLoadError(error.message);
              setLoading(false);
            });
        }, []);

        const [activeImageIndex, setActiveImageIndex] = React.useState(0);
        const [activeTab, setActiveTab] = React.useState("description");

        if (loading) {
          return <p className="loading-message">Loading property…</p>;
        }

        if (loadError) {
          return (
            <p className="loading-message error">
              Sorry, something went wrong loading the property data: {loadError}
            </p>
          );
        }

        const property =
            properties.find(p => p.id === idFromUrl) ||
            properties[0];

        if (!property) {
          return <p className="loading-message error">No properties found.</p>;
        }

        const mainImage = property.images[activeImageIndex];
        return (
        <div className="property-page">
          <section className="property-main">
            <div className="property-main-image">
              <img
                src={mainImage}
                alt={property.type + " main image"}
                onError={e => (e.target.style.display = "none")}
              />
            </div>

            <div className="property-thumbnails">
              {property.images.map((img, index) => (
                <button
                  key={img}
                  type="button"
                  className={
                    "thumbnail-btn" +
                    (index === activeImageIndex ? " selected" : "")
                  }
                  onClick={() => setActiveImageIndex(index)}
                >
                  <img
                    src={img}
                    alt={property.type + " thumbnail " + (index + 1)}
                    onError={e => (e.target.style.display = "none")}
                  />
                </button>
              ))}
            </div>

            <div className="property-summary">
              <h2>
                £{property.price.toLocaleString()} – {property.bedrooms} bedroom{" "}
                {property.type}
              </h2>
              <p className="property-location">{property.location}</p>
              <p>{property.shortDescription}</p>
            </div>
          </section>

          <section className="property-tabs">
            <Tabs activeTab={activeTab} onChange={setActiveTab} />

            <div className="tab-content">
              {activeTab === "description" && (
                <div>
                  <h3>Full Description</h3>
                  <p>{property.longDescription}</p>
                </div>
              )}

              {activeTab === "floorplan" && (
                <div>
                  <h3>Floor Plan</h3>
                  <img
                    src={property.floorplan}
                    alt="Floor plan"
                    className="floorplan-image"
                    onError={e => (e.target.style.display = "none")}
                  />
                </div>
              )}

              {activeTab === "map" && (
                <div>
                  <h3>Location Map</h3>
                  <p>Approximate property location:</p>
                  <div className="map-wrapper">
                    <iframe
                      src={property.mapEmbed}
                      loading="lazy"
                      referrerPolicy="no-referrer-when-downgrade"
                      title="Google map"
                    ></iframe>
                  </div>
                </div>
              )}
            </div>
          </section>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<PropertyPage />);
  </script>
</body>
</html>
